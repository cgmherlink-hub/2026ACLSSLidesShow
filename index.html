<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 ACLS Interactive Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0D1117;color:#fff;min-height:100vh;overflow-x:hidden}

/* LOGIN */
#loginWrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 30% 40%,#1a0000 0%,#0D1117 60%)}
.login-card{background:#161B22;border:1px solid #30363D;border-radius:16px;padding:48px 40px;width:400px;text-align:center}
.login-logo{margin-bottom:28px}
.cross{display:inline-block;width:48px;height:48px;position:relative;margin-bottom:14px}
.ch,.cv{background:#E74C3C;border-radius:3px;position:absolute}
.ch{width:48px;height:14px;top:17px;left:0}
.cv{width:14px;height:48px;top:0;left:17px}
.login-logo h1{font-size:26px;font-weight:800;letter-spacing:3px;color:#fff}
.login-logo p{color:#8B949E;font-size:12px;margin-top:5px}
.lf{margin-bottom:16px;text-align:left}
.lf label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#8B949E;display:block;margin-bottom:6px}
.lf input{width:100%;padding:11px 14px;background:#0D1117;border:1px solid #30363D;border-radius:8px;color:#fff;font-size:14px;outline:none;transition:border-color .2s}
.lf input:focus{border-color:#E74C3C}
.btn-login{width:100%;padding:13px;background:#E74C3C;border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:background .2s;margin-top:6px}
.btn-login:hover{background:#C0392B}
.err{background:#2D1317;border:1px solid #E74C3C;color:#F1948A;padding:10px;border-radius:8px;font-size:12px;margin-top:12px;display:none}
.login-footer{color:#3D444D;font-size:11px;margin-top:22px}

/* PLAYER APP */
#playerWrap{display:none;flex-direction:column;min-height:100vh}

/* TOP BAR */
.topbar{background:#161B22;border-bottom:1px solid #21262D;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.tb-brand{display:flex;align-items:center;gap:12px}
.mini-cross{width:24px;height:24px;position:relative;flex-shrink:0}
.mh,.mv{background:#E74C3C;border-radius:2px;position:absolute}
.mh{width:24px;height:7px;top:8.5px;left:0}
.mv{width:7px;height:24px;top:0;left:8.5px}
.tb-brand h2{font-size:16px;font-weight:800;letter-spacing:2px;color:#fff}
.tb-brand span{font-size:11px;color:#8B949E}
.tb-right{display:flex;align-items:center;gap:10px}
.tb-user{font-size:12px;font-weight:600;color:#E74C3C;background:#2D1317;border:1px solid #E74C3C44;padding:4px 12px;border-radius:20px}
.tb-btn{background:transparent;border:1px solid #30363D;color:#8B949E;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s}
.tb-btn:hover{border-color:#E74C3C;color:#E74C3C}

/* LAYOUT */
.player-layout{display:flex;flex:1;min-height:0;gap:0}

/* SIDEBAR */
.sidebar{width:240px;background:#0D1117;border-right:1px solid #21262D;overflow-y:auto;flex-shrink:0}
.sidebar-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#3D444D;padding:16px 16px 8px}
.thumb-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.thumb-item:hover{background:#161B22}
.thumb-item.active{background:#161B22;border-left-color:#E74C3C}
.thumb-dot{width:32px;height:20px;border-radius:3px;flex-shrink:0;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff}
.thumb-label{font-size:11px;color:#8B949E;line-height:1.3}
.thumb-item.active .thumb-label{color:#fff}
.thumb-num{font-size:9px;color:#3D444D;flex-shrink:0;margin-left:auto}

/* MAIN */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;background:#0D1117}

/* SLIDE STAGE */
.slide-stage{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;min-height:0}
.slide-frame{width:100%;max-width:880px;aspect-ratio:16/9;border-radius:10px;overflow:hidden;position:relative;box-shadow:0 0 0 1px #21262D}

/* CONTROLS */
.controls{background:#161B22;border-top:1px solid #21262D;padding:14px 24px;display:flex;align-items:center;gap:16px}
.ctrl-btn{background:#21262D;border:1px solid #30363D;color:#fff;width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.ctrl-btn:hover:not(:disabled){background:#30363D;border-color:#E74C3C}
.ctrl-btn:disabled{opacity:.3;cursor:default}
.progress-wrap{flex:1;display:flex;align-items:center;gap:12px}
.progress-bar-bg{flex:1;height:4px;background:#21262D;border-radius:2px;cursor:pointer;position:relative}
.progress-bar-fill{height:100%;background:#E74C3C;border-radius:2px;transition:width .2s}
.slide-counter{font-size:13px;color:#8B949E;white-space:nowrap;min-width:56px;text-align:right}
.ctrl-right{display:flex;align-items:center;gap:8px}
.auto-btn{font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer;border:1px solid #30363D;background:#21262D;color:#8B949E;transition:all .15s}
.auto-btn.running{background:#2D1317;border-color:#E74C3C44;color:#E74C3C}

/* SLIDE CONTENT — all slides share .slide-frame */
.slide{width:100%;height:100%;position:absolute;top:0;left:0;display:none}
.slide.active{display:block}

/* Slide base styles */
.s-wrap{width:100%;height:100%;display:flex;flex-direction:column;font-family:'Segoe UI',Arial,sans-serif}
.s-hdr{padding:4% 5% 3%;flex-shrink:0}
.s-hdr h2{font-size:2.2vw;font-weight:800;line-height:1.2;margin:0}
.s-hdr p{font-size:1.1vw;margin-top:.3em;opacity:.75}
.s-body{flex:1;padding:0 5% 4%;overflow:hidden;display:flex;flex-direction:column;justify-content:center;gap:2%}

/* Slide colors */
.bg-navy{background:#0A0F1E}
.bg-dark{background:#0D1117}
.bg-gray{background:#F8F9FA;color:#1B2631}
.bg-midnight{background:#1A1A2E}
.bg-teal{background:#0B1F2A}

.text-red{color:#E74C3C}
.text-teal{color:#1ABC9C}
.text-amber{color:#F39C12}
.text-blue{color:#3498DB}
.text-white{color:#fff}
.text-muted{color:#8B949E}

.tag{display:inline-block;font-size:.9vw;font-weight:700;padding:.2em .7em;border-radius:4px}
.tag-red{background:#2D1317;color:#E74C3C;border:1px solid #E74C3C44}
.tag-teal{background:#0B2B2B;color:#1ABC9C;border:1px solid #1ABC9C44}
.tag-blue{background:#0B1F2B;color:#3498DB;border:1px solid #3498DB44}
.tag-amber{background:#2B1F0A;color:#F39C12;border:1px solid #F39C1244}

.card-grid{display:grid;gap:1.5%;height:100%}
.card-grid-2{grid-template-columns:1fr 1fr}
.card-grid-3{grid-template-columns:1fr 1fr 1fr}
.card-grid-22{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:3% 4%;display:flex;flex-direction:column;gap:.5em}
.card-title{font-size:1.3vw;font-weight:800;line-height:1.2}
.card-sub{font-size:.95vw;opacity:.6;line-height:1.4}
.card-val{font-size:2.6vw;font-weight:800;line-height:1}
.card-unit{font-size:.9vw;opacity:.55}
.bullet-list{list-style:none;padding:0;display:flex;flex-direction:column;gap:.5em}
.bullet-list li{font-size:1vw;line-height:1.4;padding-left:1.2em;position:relative;opacity:.9}
.bullet-list li::before{content:'';position:absolute;left:0;top:.5em;width:.5em;height:.5em;border-radius:50%;background:currentColor}

.big-title{font-size:6vw;font-weight:900;letter-spacing:-.02em;line-height:.9}
.subtitle{font-size:1.6vw;font-weight:400;margin-top:1.5%;line-height:1.4}

.flow-row{display:flex;align-items:stretch;gap:1%;flex:1}
.flow-box{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2% 3%;font-size:1.05vw;font-weight:700;line-height:1.3;gap:.5em}
.flow-arrow{display:flex;align-items:center;justify-content:center;color:#E74C3C;font-size:1.8vw;flex-shrink:0;width:3%}

.hdr-bar{padding:2.5% 5%;flex-shrink:0}
.hdr-bar h2{font-size:2vw;font-weight:800}
.hdr-bar p{font-size:1vw;opacity:.6;margin-top:.2em}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:2%;flex:1;min-height:0}
.col-panel{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:3% 4%;display:flex;flex-direction:column;gap:.8em;overflow:hidden}
.col-panel-title{font-size:1.3vw;font-weight:800;padding-bottom:.5em;border-bottom:1px solid rgba(255,255,255,.1)}

.chain-row{display:flex;align-items:center;gap:0;flex:none;height:22%}
.chain-node{flex:1;background:rgba(255,255,255,.05);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-size:.9vw;font-weight:700;line-height:1.3;padding:1%;height:100%}
.chain-conn{width:3%;display:flex;align-items:center;justify-content:center;font-size:1.5vw;color:#444}

/* slide 1 title */
.s1-year{font-size:5vw;font-weight:900;color:#E74C3C;letter-spacing:-.02em;line-height:1}
.s1-main{font-size:10vw;font-weight:900;color:#fff;letter-spacing:-.04em;line-height:.85}
.s1-sub{font-size:1.8vw;color:#1ABC9C;margin-top:2%;font-weight:400}
.s1-bar{background:#8B0000;padding:2.5% 5%;margin-top:auto}
.s1-bar p{font-size:1.2vw;color:#fff;font-weight:600}
.s1-bar span{font-size:1vw;color:#aaa;font-weight:400}

.dot{width:.6vw;height:.6vw;border-radius:50%;display:inline-block;flex-shrink:0;margin-right:.4em}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="cross"><div class="ch"></div><div class="cv"></div></div>
      <h1>ACLS 2026</h1>
      <p>Advanced Cardiovascular Life Support — 教育資源系統</p>
    </div>
    <div class="lf">
      <label>使用者名稱 Username</label>
      <input type="text" id="uIn" placeholder="輸入使用者名稱" autocomplete="username"/>
    </div>
    <div class="lf">
      <label>密碼 Password</label>
      <input type="password" id="pIn" placeholder="輸入密碼" autocomplete="current-password"/>
    </div>
    <button class="btn-login" onclick="doLogin()">登入 Login</button>
    <div class="err" id="errMsg">使用者名稱或密碼錯誤，請重試。</div>
    <p class="login-footer">American Heart Association · 僅供教育用途</p>
  </div>
</div>

<!-- PLAYER -->
<div id="playerWrap">
  <div class="topbar">
    <div class="tb-brand">
      <div class="mini-cross"><div class="mh"></div><div class="mv"></div></div>
      <div>
        <h2>ACLS 2026</h2>
        <span>Interactive Slide Player</span>
      </div>
    </div>
    <div class="tb-right">
      <div class="tb-user" id="tbUser">Bluer2026</div>
      <button class="tb-btn" onclick="doLogout()">登出</button>
    </div>
  </div>

  <div class="player-layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-title">課程目錄</div>
      <div id="thumbList"></div>
    </div>

    <!-- MAIN -->
    <div class="main-area">
      <div class="slide-stage">
        <div class="slide-frame" id="slideFrame"></div>
      </div>

      <!-- CONTROLS -->
      <div class="controls">
        <button class="ctrl-btn" id="btnFirst" onclick="goTo(0)" title="First">&#171;</button>
        <button class="ctrl-btn" id="btnPrev" onclick="prev()" title="Previous">&#8592;</button>
        <div class="progress-wrap">
          <div class="progress-bar-bg" id="progBg" onclick="seekClick(event)">
            <div class="progress-bar-fill" id="progFill" style="width:10%"></div>
          </div>
        </div>
        <button class="ctrl-btn" id="btnNext" onclick="next()" title="Next">&#8594;</button>
        <button class="ctrl-btn" id="btnLast" onclick="goTo(slides.length-1)" title="Last">&#187;</button>
        <span class="slide-counter" id="counter">1 / 10</span>
        <div class="ctrl-right">
          <button class="auto-btn" id="autoBtn" onclick="toggleAuto()">&#9654; 自動播放</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const CREDS = {"Bluer2026":"Bluer2026"};

document.getElementById('pIn').onkeydown = e => { if(e.key==='Enter') doLogin(); };
document.getElementById('uIn').onkeydown = e => { if(e.key==='Enter') document.getElementById('pIn').focus(); };

function doLogin(){
  const u=document.getElementById('uIn').value.trim();
  const p=document.getElementById('pIn').value;
  if(CREDS[u]&&CREDS[u]===p){
    document.getElementById('loginWrap').style.display='none';
    const pw=document.getElementById('playerWrap');
    pw.style.display='flex';
    document.getElementById('tbUser').textContent=u;
    initPlayer();
  } else {
    const e=document.getElementById('errMsg');
    e.style.display='block';
    document.getElementById('pIn').value='';
  }
}

function doLogout(){
  document.getElementById('playerWrap').style.display='none';
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('uIn').value='';
  document.getElementById('pIn').value='';
  document.getElementById('errMsg').style.display='none';
  stopAuto();
}

const slides = [
  {
    color:'#8B0000', label:'課程封面', short:'Title',
    html:`<div class="s-wrap bg-navy" style="justify-content:space-between">
      <div style="padding:6% 6% 0">
        <div class="s1-year">2026</div>
        <div class="s1-main">ACLS</div>
        <div class="s1-sub">Advanced Cardiovascular Life Support</div>
        <div style="margin-top:2%;color:#aaa;font-size:1.3vw">Updated Guidelines &amp; Protocols</div>
      </div>
      <div class="s1-bar">
        <p>American Heart Association &nbsp;|&nbsp; <span>2026 Edition</span></p>
      </div>
    </div>`
  },
  {
    color:'#C0392B', label:'課程大綱', short:'Overview',
    html:`<div class="s-wrap bg-gray">
      <div class="hdr-bar" style="background:#8B0000;color:#fff">
        <h2>課程大綱 Course Overview</h2>
      </div>
      <div class="s-body" style="display:grid;grid-template-columns:1fr 1fr;gap:1.5%;padding:3% 4%">
        ${[['01','心跳停止流程','VF/VT · Asystole/PEA','#C0392B'],['02','呼吸道處置','BVM · Advanced Airways','#2E86C1'],['03','急性冠心症','STEMI · NSTEMI · ACS','#8B0000'],['04','心律異常','Bradycardia · Tachycardia','#1A8E8E'],['05','藥物更新','Epi · Amio · Adenosine','#2E86C1'],['06','特殊情境','Pregnancy · Hypothermia','#F39C12']].map(([n,t,s,c])=>`
        <div style="background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:3% 4%;border-left:4px solid ${c};display:flex;flex-direction:column;gap:.3em">
          <div style="font-size:.9vw;font-weight:800;color:${c}">${n}</div>
          <div style="font-size:1.3vw;font-weight:800;color:#1B2631">${t}</div>
          <div style="font-size:.9vw;color:#7F8C8D">${s}</div>
        </div>`).join('')}
      </div>
    </div>`
  },
  {
    color:'#1B2631', label:'心跳停止流程', short:'Arrest',
    html:`<div class="s-wrap bg-navy">
      <div class="hdr-bar" style="background:#C0392B;color:#fff;padding:2% 4%">
        <h2>Adult Cardiac Arrest Algorithm 2026</h2>
      </div>
      <div style="flex:1;display:flex;gap:3%;padding:2% 4%;min-height:0">
        <div style="flex:1;display:flex;flex-direction:column;gap:1.2%">
          ${[['無反應 · 無呼吸','#C0392B'],['啟動EMS · 取得AED','#1A8E8E'],['開始高品質CPR','#1A8E8E'],['連接AED/監視器','#5D6D7E']].map(([t,c])=>`
          <div style="background:${c};border-radius:6px;padding:2.5% 4%;font-size:1.2vw;font-weight:800;color:#fff;text-align:center">${t}</div>`).join('<div style="text-align:center;color:#E74C3C;font-size:1.5vw">↓</div>')}
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:2%">
          <div style="background:#F39C12;border-radius:8px;padding:3%;text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <div style="font-size:1.5vw;font-weight:800;color:#1B2631">⚡ 可電擊節律？</div>
            <div style="font-size:1.1vw;color:#1B2631;margin-top:.3em">VF / Pulseless VT</div>
            <div style="margin-top:.8em;background:#fff;border-radius:6px;padding:.5em 1em;font-size:.9vw;font-weight:700;color:#8B0000">立即電擊 200J</div>
            <div style="margin-top:.4em;font-size:.85vw;color:#333">繼續CPR → Amiodarone 300mg</div>
          </div>
          <div style="background:#5D6D7E;border-radius:8px;padding:3%;text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <div style="font-size:1.5vw;font-weight:800;color:#fff">不可電擊</div>
            <div style="font-size:1.1vw;color:#BDC3C7;margin-top:.3em">Asystole / PEA</div>
            <div style="margin-top:.8em;background:#fff;border-radius:6px;padding:.5em 1em;font-size:.9vw;font-weight:700;color:#1B2631">Epinephrine 1mg ASAP</div>
            <div style="margin-top:.4em;font-size:.85vw;color:#BDC3C7">5H5T 可逆原因</div>
          </div>
        </div>
      </div>
      <div style="padding:1.5% 4%;font-size:.9vw;color:#1ABC9C;text-align:center;border-top:1px solid #21262D">
        每2分鐘換手 CPR · ETCO2 目標 ≥10 mmHg · 避免過度換氣
      </div>
    </div>`
  },
  {
    color:'#1A8E8E', label:'高品質CPR', short:'CPR',
    html:`<div class="s-wrap bg-dark">
      <div class="hdr-bar" style="background:#0E6B6B;color:#fff;padding:2% 4%">
        <h2>高品質 CPR &amp; 生存鏈</h2>
        <p>High-Quality CPR · Chain of Survival</p>
      </div>
      <div style="flex:1;padding:2% 4%;display:flex;flex-direction:column;gap:3%;min-height:0">
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1.5%;flex:none">
          ${[['頻率','100–120','/min','#E74C3C'],['深度','2–2.4"','inches','#1ABC9C'],['回彈','完全','recoil','#3498DB'],['中斷','<10','seconds','#F39C12']].map(([l,v,u,c])=>`
          <div style="background:rgba(255,255,255,.05);border:1px solid ${c}44;border-top:3px solid ${c};border-radius:8px;padding:3%;text-align:center">
            <div style="font-size:1vw;color:#aaa;font-weight:700;text-transform:uppercase;letter-spacing:.05em">${l}</div>
            <div style="font-size:2.5vw;font-weight:900;color:${c};line-height:1;margin:.3em 0">${v}</div>
            <div style="font-size:.9vw;color:#666">${u}</div>
          </div>`).join('')}
        </div>
        <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:2.5% 4%;flex:1">
          <div style="font-size:1.2vw;font-weight:800;color:#1ABC9C;margin-bottom:2%">2026 成人院外心跳停止生存鏈</div>
          <div style="display:flex;align-items:stretch;gap:.5%;height:55%">
            ${[['1','早期辨識','#E74C3C'],['2','早期CPR','#F39C12'],['3','早期電擊','#3498DB'],['4','進階治療','#1A8E8E'],['5','急救後照護','#27AE60']].map(([n,t,c],i,a)=>`
            <div style="flex:1;background:${c};border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3% 1%">
              <div style="font-size:2vw;font-weight:900;color:#fff">${n}</div>
              <div style="font-size:.85vw;font-weight:700;color:#fff;margin-top:.3em;line-height:1.3">${t}</div>
            </div>${i<a.length-1?'<div style="display:flex;align-items:center;color:#444;font-size:1.3vw;flex-shrink:0;width:1.5%">›</div>':''}`).join('')}
          </div>
        </div>
      </div>
    </div>`
  },
  {
    color:'#2E86C1', label:'藥物更新', short:'Drugs',
    html:`<div class="s-wrap bg-midnight">
      <div class="hdr-bar" style="background:#C0392B;color:#fff;padding:2% 4%">
        <h2>2026 藥物更新 Pharmacology</h2>
      </div>

let cur = 0;
let autoTimer = null;

function initPlayer(){
  const frame = document.getElementById('slideFrame');
  const list = document.getElementById('thumbList');
  frame.innerHTML = slides.map((s,i)=>`<div class="slide${i===0?' active':''}" id="slide${i}">${s.html}</div>`).join('');
  list.innerHTML = slides.map((s,i)=>`
    <div class="thumb-item${i===0?' active':''}" id="th${i}" onclick="goTo(${i})">
      <div class="thumb-dot" style="background:${s.color}">${i+1}</div>
      <div class="thumb-label">${s.label}</div>
    </div>`).join('');
  updateUI();
}

function goTo(n){
  document.getElementById('slide'+cur).classList.remove('active');
  document.getElementById('th'+cur).classList.remove('active');
  cur = Math.max(0,Math.min(n,slides.length-1));
  document.getElementById('slide'+cur).classList.add('active');
  document.getElementById('th'+cur).classList.add('active');
  document.getElementById('th'+cur).scrollIntoView({behavior:'smooth',block:'nearest'});
  updateUI();
}

function prev(){ goTo(cur-1); }
function next(){ goTo(cur+1); }

function updateUI(){
  document.getElementById('btnPrev').disabled = cur===0;
  document.getElementById('btnFirst').disabled = cur===0;
  document.getElementById('btnNext').disabled = cur===slides.length-1;
  document.getElementById('btnLast').disabled = cur===slides.length-1;
  document.getElementById('counter').textContent = (cur+1)+' / '+slides.length;
  document.getElementById('progFill').style.width = ((cur/(slides.length-1))*100)+'%';
}

function seekClick(e){
  const rect = document.getElementById('progBg').getBoundingClientRect();
  const pct = (e.clientX-rect.left)/rect.width;
  goTo(Math.round(pct*(slides.length-1)));
}

function toggleAuto(){
  if(autoTimer){ stopAuto(); }
  else {
    document.getElementById('autoBtn').textContent='⏸ 暫停';
    document.getElementById('autoBtn').classList.add('running');
    autoTimer = setInterval(()=>{ if(cur>=slides.length-1){stopAuto();return;} next(); },4000);
  }
}

function stopAuto(){
  clearInterval(autoTimer); autoTimer=null;
  document.getElementById('autoBtn').textContent='▶ 自動播放';
  document.getElementById('autoBtn').classList.remove('running');
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('loginWrap').style.display==='none'||document.getElementById('playerWrap').style.display!=='none'){
    if(e.key==='ArrowRight'||e.key==='ArrowDown') next();
    if(e.key==='ArrowLeft'||e.key==='ArrowUp') prev();
  }
});
</script>
